<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Gallery — Lighthouse</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue: #1a5cff; --sky: #4eb4ff; --yellow: #ffe14d;
  --dark: #050e2e; --mid: #1c2b5e; --offwhite: #f4f8ff;
  --coral: #ff6b5b; --mint: #3dffc0; --lilac: #c084fc;
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--offwhite); color: var(--dark); overflow-x: hidden; cursor: none; }

/* CURSOR */
.cursor { width: 32px; height: 32px; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; filter: drop-shadow(0 0 6px #ffe14d) drop-shadow(0 0 14px #ffcc00); }
.cursor svg { width: 100%; height: 100%; }
@keyframes cursor-spin {
  0%   { transform: translate(-50%,-50%) rotate(0deg)   scale(1); }
  50%  { transform: translate(-50%,-50%) rotate(180deg) scale(1); }
  100% { transform: translate(-50%,-50%) rotate(360deg) scale(1); }
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 52px;
  background: rgba(5,14,46,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(78,180,255,0.1);
}
.nav-logo { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; }
.nav-logo svg { width: 22px; height: 32px; flex-shrink: 0; }
.nav-back { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.nav-back:hover { color: var(--yellow); }

/* HERO */
.gallery-hero {
  min-height: 340px; background: var(--dark);
  display: flex; align-items: flex-end;
  padding: 140px 52px 60px;
  position: relative; overflow: hidden;
}
.gallery-hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 30% 60%, rgba(26,92,255,0.25), transparent 60%), radial-gradient(ellipse at 80% 30%, rgba(192,132,252,0.15), transparent 50%); }
.gallery-hero-content { position: relative; z-index: 1; }
.gallery-hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(48px, 6vw, 80px); font-weight: 300; color: white; line-height: 1.05; margin-bottom: 14px; }
.gallery-hero h1 em { font-style: italic; color: var(--yellow); }
.gallery-hero p { color: rgba(255,255,255,0.55); font-size: 16px; max-width: 480px; line-height: 1.8; }

/* FILTER TABS */
.filter-bar { padding: 40px 52px 0; display: flex; gap: 10px; flex-wrap: wrap; }
.ftab { padding: 8px 20px; border-radius: 100px; font-size: 12.5px; font-weight: 600; letter-spacing: 0.5px; cursor: none; border: 1.5px solid rgba(26,92,255,0.15); background: white; color: rgba(5,14,46,0.5); transition: all 0.2s; }
.ftab.active, .ftab:hover { background: var(--blue); color: white; border-color: var(--blue); }

/* GALLERY GRID */
.gallery-grid { padding: 40px 52px 100px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 560px) { .gallery-grid { grid-template-columns: 1fr; padding: 24px 20px 60px; } .filter-bar { padding: 24px 20px 0; } nav { padding: 16px 20px; } .gallery-hero { padding: 120px 20px 48px; } }

.gallery-item {
  border-radius: 18px; overflow: hidden;
  background: #dce8f5;
  aspect-ratio: 4/3;
  position: relative;
  border: 1.5px solid rgba(26,92,255,0.08);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px;
  transition: transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.3s;
  cursor: none;
}
.gallery-item:nth-child(3n+1) { background: #d8e8ff; }
.gallery-item:nth-child(3n+2) { background: #d8f5ee; }
.gallery-item:nth-child(3n+3) { background: #f5e8d8; }
.gallery-item.tall { grid-row: span 2; aspect-ratio: unset; min-height: 460px; }
.gallery-item:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 24px 60px rgba(26,92,255,0.12); }
.gallery-item img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.placeholder-icon { font-size: 32px; opacity: 0.4; }
.placeholder-text { font-size: 11.5px; color: rgba(5,14,46,0.35); font-weight: 500; letter-spacing: 0.5px; }
.item-overlay {
  position: absolute; inset: 0; background: rgba(5,14,46,0.55);
  display: flex; align-items: flex-end; padding: 18px;
  opacity: 0; transition: opacity 0.25s;
}
.gallery-item:hover .item-overlay { opacity: 1; }
.item-caption { font-size: 13px; color: white; font-weight: 500; }

/* COMING SOON BANNER */
.coming-soon-note {
  text-align: center; padding: 0 52px 60px;
  color: rgba(5,14,46,0.4); font-size: 14px; font-weight: 300; line-height: 1.8;
}
.coming-soon-note span { display: inline-block; background: rgba(26,92,255,0.07); padding: 10px 24px; border-radius: 100px; }

/* BACK BUTTON */
.back-section { text-align: center; padding-bottom: 80px; }
.btn-back { display:inline-block; padding:13px 32px; border-radius:100px; background:var(--dark); color:white; font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; text-decoration:none; transition: background 0.2s, transform 0.2s; }
.btn-back:hover { background: var(--blue); transform: translateY(-2px); }

/* SPARKLE STARS */
.g-star { position: fixed; pointer-events: none; animation: sparkle var(--sd,3s) ease-in-out infinite; animation-delay: var(--delay,0s); opacity: 0; z-index: 0; }
@keyframes sparkle {
  0%   { opacity:0; transform:scale(0.4) rotate(0deg); filter:drop-shadow(0 0 2px currentColor); }
  30%  { opacity:1; transform:scale(1.2) rotate(20deg); filter:drop-shadow(0 0 8px currentColor) drop-shadow(0 0 16px currentColor); }
  60%  { opacity:0.75; transform:scale(0.9) rotate(-10deg); }
  100% { opacity:0; transform:scale(0.3) rotate(30deg); }
}

/* ═══════════════════════════════════
   MOBILE RESPONSIVE — max 768px
═══════════════════════════════════ */
@media (max-width: 768px) {
  /* NAV */
  nav { padding: 14px 20px !important; }
  .nav-logo { font-size: 20px !important; }
  .nav-cta { padding: 8px 14px !important; font-size: 12px !important; }
  .nav-links { display: none !important; }

  /* HERO */
  .hero { padding: 110px 20px 70px !important; }
  .hero-title { font-size: clamp(38px, 10vw, 56px) !important; }
  .hero-sub { font-size: 14px !important; }
  .hero-btns { flex-direction: column !important; gap: 12px !important; }
  .hero-btns a { width: 100% !important; text-align: center !important; justify-content: center !important; }
  .hero-content { max-width: 100% !important; }

  /* SECTIONS general */
  .impact, .what, .how, .team, .gallery-section, .join,
  .partners-section { padding: 60px 20px !important; }
  .impact > *, .what > *, .how > *, .team > *, .join > * { padding-left: 0 !important; padding-right: 0 !important; }

  /* IMPACT grid */
  .impact-layout { grid-template-columns: 1fr !important; gap: 40px !important; }
  .impact-nums { grid-template-columns: 1fr 1fr !important; gap: 14px !important; }
  .icard { padding: 22px 18px !important; }
  .icard .big-n { font-size: 36px !important; }

  /* WHAT WE DO */
  .what-grid { grid-template-columns: 1fr !important; gap: 16px !important; margin-top: 36px !important; }

  /* HOW */
  .steps { grid-template-columns: 1fr !important; border-radius: 16px !important; }
  .step-line { display: none !important; }
  .step { padding: 28px 22px !important; }

  /* TEAM */
  .team-grid { grid-template-columns: 1fr 1fr !important; gap: 14px !important; }

  /* GALLERY carousel */
  .gallery-section { padding: 60px 20px !important; }
  .carousel-slide { flex: 0 0 85% !important; }

  /* PARTNERS */
  .partners-section .section-tag,
  .partners-section h2,
  .partners-section p { padding-left: 20px !important; }

  /* JOIN */
  .join { padding: 70px 20px !important; }
  .join h2 { font-size: clamp(34px, 9vw, 52px) !important; }
  .join-btns { flex-direction: column !important; align-items: center !important; }
  .btn-white, .btn-outline-white { width: 100% !important; justify-content: center !important; text-align: center !important; }

  /* SECTION titles */
  .sec-title { font-size: clamp(32px, 8vw, 48px) !important; }

  /* FOOTER */
  .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
  .ocean-floor { padding: 48px 20px 32px !important; }

  /* EXPLORE / CHOICE CARDS */
  .choices { grid-template-columns: 1fr !important; gap: 16px !important; }
  .choice-card { padding: 34px 26px !important; }
  main { padding: 100px 16px 60px !important; }
  .page-title { font-size: clamp(36px, 9vw, 56px) !important; }
  .page-sub { font-size: 14px !important; }

  /* FORM PAGES */
  .page-wrap { padding: 90px 16px 60px !important; max-width: 100% !important; }
  .form-card { padding: 22px 16px !important; }
  .field-row { grid-template-columns: 1fr !important; }
  .subjects-grid { grid-template-columns: repeat(2,1fr) !important; }
  .steps-bar { gap: 4px !important; }
  .step-ind { font-size: 10px !important; gap: 6px !important; }
  .step-line { max-width: 20px !important; }

  /* LOGIN */
  .portal-card { padding: 28px 18px !important; }

  /* GALLERY page */
  .gallery-hero { padding: 110px 20px 44px !important; }
  .filter-bar { padding: 24px 16px 0 !important; flex-wrap: wrap !important; }
  .gallery-grid { padding: 24px 16px 60px !important; grid-template-columns: 1fr 1fr !important; }
  .gallery-item.tall { grid-row: span 1 !important; min-height: 200px !important; }

  /* SIDEBAR ADMIN/DASHBOARD */
  .sidebar { display: none !important; }
  .main-content { margin-left: 0 !important; padding: 24px 16px 60px !important; }
  .stats-row { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
  .content-grid { grid-template-columns: 1fr !important; }
  .data-table { font-size: 12px !important; }
  .data-table th, .data-table td { padding: 10px 12px !important; }
  .action-row { flex-wrap: wrap !important; gap: 6px !important; }
}

@media (max-width: 420px) {
  .gallery-grid { grid-template-columns: 1fr !important; }
  .team-grid { grid-template-columns: 1fr !important; }
  .impact-nums { grid-template-columns: 1fr !important; }
  .subjects-grid { grid-template-columns: 1fr 1fr !important; }
  .info-grid { grid-template-columns: 1fr !important; }
}

</style>
</head>
<body>

<div class="cursor" id="cursor">
  <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2 L22.5 17.5 L38 20 L22.5 22.5 L20 38 L17.5 22.5 L2 20 L17.5 17.5 Z" fill="#ffe14d"/>
    <path d="M20 8 L21.5 18.5 L32 20 L21.5 21.5 L20 32 L18.5 21.5 L8 20 L18.5 18.5 Z" fill="#fff176" opacity="0.6"/>
    <circle cx="20" cy="20" r="3.5" fill="white" opacity="0.9"/>
  </svg>
</div>

<!-- Decorative stars -->
<svg class="g-star" style="top:12%;left:4%;--sd:2.8s;--delay:0s;width:24px;height:24px" viewBox="0 0 24 24"><path d="M12 2 L13.5 9 L20 8 L15 13 L17 20 L12 16 L7 20 L9 13 L4 8 L10.5 9 Z" fill="#ffe14d"/></svg>
<svg class="g-star" style="top:30%;right:3%;--sd:3.4s;--delay:-1.2s;width:18px;height:18px" viewBox="0 0 24 24"><path d="M12 1 L13 11 L23 12 L13 13 L12 23 L11 13 L1 12 L11 11 Z" fill="#4eb4ff"/></svg>
<svg class="g-star" style="top:60%;left:2%;--sd:2.2s;--delay:-0.6s;width:20px;height:20px" viewBox="0 0 24 24"><path d="M12 2 L13.5 9 L20 8 L15 13 L17 20 L12 16 L7 20 L9 13 L4 8 L10.5 9 Z" fill="#c084fc"/></svg>
<svg class="g-star" style="top:80%;right:5%;--sd:3.1s;--delay:-2s;width:16px;height:16px" viewBox="0 0 24 24"><path d="M12 1 L13 11 L23 12 L13 13 L12 23 L11 13 L1 12 L11 11 Z" fill="#ffe14d"/></svg>

<nav>
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="27" width="12" height="4" rx="1.5" fill="#c8b070"/>
      <polygon points="7,27 15,27 13.5,10 8.5,10" fill="#e8dfc8"/>
      <polygon points="7.2,22 14.8,22 14.4,18 7.6,18" fill="#d43030" opacity="0.9"/>
      <polygon points="7.8,15 14.2,15 13.9,12 8.1,12" fill="#d43030" opacity="0.9"/>
      <rect x="10" y="23" width="2.5" height="4" rx="1.2" fill="#7a5c38"/>
      <rect x="7.5" y="6" width="7" height="5" rx="1" fill="#b8a060"/>
      <ellipse cx="11" cy="6" rx="4.5" ry="2" fill="#a09050"/>
      <polygon points="8.5,5.5 13.5,5.5 11,1.5" fill="#888040"/>
      <circle cx="11" cy="8.5" r="2.2" fill="#ffe57d" opacity="0.95"/>
      <circle cx="11" cy="8.5" r="1.2" fill="white"/>
      <polygon points="11,8.5 2,3 6,7" fill="rgba(255,240,120,0.5)"/>
      <polygon points="11,8.5 20,3 16,7" fill="rgba(255,240,120,0.3)"/>
    </svg>
    Lighthouse
  </a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<div class="gallery-hero">
  <div class="gallery-hero-content">
    <h1>Our <em>Gallery</em></h1>
    <p>Every photo tells a story. Here's ours — sessions, smiles, and the moments that remind us why we do this.</p>
  </div>
</div>

<div class="filter-bar">
  <button class="ftab active">All</button>
  <button class="ftab">Sessions</button>
  <button class="ftab">Art Kits</button>
  <button class="ftab">Team</button>
  <button class="ftab">Events</button>
</div>

<div class="gallery-grid" id="galleryGrid"><div class="placeholder-icon" style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(5,14,46,0.35);">Loading gallery…</div></div>

<div class="coming-soon-note">
  <span>✦ &nbsp; Photos will be added as Lighthouse grows. Check back soon! &nbsp; ✦</span>
</div>

<div class="back-section">
  <a href="index.html" class="btn-back">← Back to Home</a>
</div>

<script>
// Cursor — smooth rAF
(function() {
  var el = document.getElementById('cursor'), mx = -200, my = -200, angle = 0;
  document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
  document.addEventListener('mouseleave', function() { mx = -200; my = -200; });
  function tick() { angle=(angle+1.5)%360; el.style.transform='translate('+(mx-16)+'px,'+(my-16)+'px) rotate('+angle+'deg)'; requestAnimationFrame(tick); }
  requestAnimationFrame(tick);
})();

// Filter tabs (visual only for now)
document.querySelectorAll('.ftab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});
</script>
<script>
(function() {
  const sb = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');
  let allPhotos = [];

  async function loadGallery(filter) {
    const { data } = await sb.from('gallery').select('*').order('created_at', { ascending: false });
    allPhotos = data || [];
    renderGallery(filter || 'all');
  }

  function renderGallery(filter) {
    const grid = document.getElementById('galleryGrid');
    const photos = filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter);
    if (photos.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;"><div style="font-size:32px;opacity:0.4;margin-bottom:10px;">📸</div><div style="font-size:13px;color:rgba(5,14,46,0.4);font-weight:500;letter-spacing:0.5px;">Photos coming soon</div></div>';
      return;
    }
    grid.innerHTML = photos.map(p => `
      <div class="gallery-item">
        <img src="${p.image_url}" alt="${p.caption || ''}" loading="lazy">
        <div class="item-overlay"><div class="item-caption">${p.caption || ''}</div></div>
      </div>`).join('');
  }

  // Filter tabs
  document.querySelectorAll('.ftab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const cat = tab.textContent.toLowerCase().trim();
      renderGallery(cat === 'all' ? 'all' : cat);
    });
  });

  loadGallery('all');
})();
</script>
</body>
</html>
