<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Lighthouse</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;cursor:none !important;}
:root{--blue:#1a5cff;--sky:#4eb4ff;--yellow:#ffe14d;--dark:#050e2e;--mid:#1c2b5e;--mint:#3dffc0;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:white;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.cursor{width:28px;height:28px;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;filter:drop-shadow(0 0 6px #ffe14d);}
.cursor svg{width:100%;height:100%;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-glow::before{content:'';position:absolute;top:0;left:0;width:500px;height:500px;background:radial-gradient(circle,rgba(26,92,255,0.18) 0%,transparent 70%);border-radius:50%;}
.bg-glow::after{content:'';position:absolute;bottom:0;right:0;width:400px;height:400px;background:radial-gradient(circle,rgba(61,255,192,0.1) 0%,transparent 70%);border-radius:50%;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 52px;background:rgba(5,14,46,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(78,180,255,0.1);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:white;text-decoration:none;display:flex;align-items:center;gap:10px;}
.nav-logo svg{width:20px;height:28px;flex-shrink:0;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 24px 60px;position:relative;z-index:1;}
.card{width:100%;max-width:420px;background:rgba(255,255,255,0.06);border:1px solid rgba(78,180,255,0.2);border-radius:24px;padding:48px 40px;backdrop-filter:blur(24px);}
.card-eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--sky);margin-bottom:10px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1.15;margin-bottom:28px;}
.card-title em{font-style:italic;color:var(--yellow);}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:8px;}
.field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(78,180,255,0.18);border-radius:12px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--sky);background:rgba(78,180,255,0.08);}
.btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--blue),#4eb4ff);color:white;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;border:none;cursor:none;transition:all 0.2s;box-shadow:0 8px 24px rgba(26,92,255,0.3);}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.5;transform:none;}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;line-height:1.7;}
.alert.error{background:rgba(255,107,91,0.14);border:1px solid rgba(255,107,91,0.28);color:#ff9b8f;}
.alert.success{background:rgba(61,255,192,0.1);border:1px solid rgba(61,255,192,0.25);color:var(--mint);}
.alert.show{display:block;}
@media(max-width:560px){nav{padding:16px 20px;}.card{padding:32px 20px;}}
</style>
</head>
<body>
<div class="cursor" id="cursor"><svg viewBox="0 0 40 40"><path d="M20 2 L22.5 17.5 L38 20 L22.5 22.5 L20 38 L17.5 22.5 L2 20 L17.5 17.5 Z" fill="#ffe14d"/><circle cx="20" cy="20" r="3.5" fill="white" opacity="0.9"/></svg></div>
<div class="bg-glow"></div>
<nav>
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="27" width="12" height="4" rx="1.5" fill="#c8b070"/><polygon points="7,27 15,27 13.5,10 8.5,10" fill="#e8dfc8"/><polygon points="7.2,22 14.8,22 14.4,18 7.6,18" fill="#d43030" opacity="0.9"/><circle cx="11" cy="8.5" r="2.2" fill="#ffe57d" opacity="0.95"/><circle cx="11" cy="8.5" r="1.2" fill="white"/></svg>
    Lighthouse
  </a>
</nav>
<main>
  <div class="card">
    <div class="card-eyebrow">Password Reset</div>
    <h1 class="card-title">Set your <em>new password</em></h1>
    <div class="alert error" id="errAlert"></div>
    <div class="alert success" id="sucAlert"></div>
    <div id="formWrap">
      <div class="field"><label>New Password</label><input type="password" id="pw1" placeholder="At least 8 characters"></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="pw2" placeholder="Repeat your password"></div>
      <button class="btn" onclick="handleReset()" id="resetBtn">Set Password →</button>
    </div>
  </div>
</main>
<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

async function handleReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('errAlert');
  const suc = document.getElementById('sucAlert');
  err.classList.remove('show'); suc.classList.remove('show');

  if (pw1.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.classList.add('show'); return; }
  if (pw1 !== pw2) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    err.textContent = 'Error: ' + error.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Set Password →';
    return;
  }

  suc.textContent = '✓ Password updated! Redirecting to login…';
  suc.classList.add('show');
  document.getElementById('formWrap').style.display = 'none';
  setTimeout(() => { window.location.href = 'volunteer-login.html'; }, 2500);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
<script>(function(){var el=document.getElementById('cursor'),mx=-200,my=-200,angle=0;document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});document.addEventListener('mouseleave',function(){mx=-200;my=-200;});function tick(){angle=(angle+1.5)%360;el.style.transform='translate('+(mx-14)+'px,'+(my-14)+'px) rotate('+angle+'deg)';requestAnimationFrame(tick);}requestAnimationFrame(tick);})();</script>
</body>
</html>
