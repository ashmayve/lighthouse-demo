<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambassador Login — Lighthouse</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;cursor:none !important;}
:root{--blue:#1a5cff;--sky:#4eb4ff;--yellow:#ffe14d;--dark:#050e2e;--mid:#1c2b5e;--mint:#3dffc0;--lilac:#c084fc;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:white;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.cursor{width:28px;height:28px;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;filter:drop-shadow(0 0 6px #ffe14d);}
.cursor svg{width:100%;height:100%;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-glow::before{content:'';position:absolute;top:0;left:0;width:500px;height:500px;background:radial-gradient(circle,rgba(192,132,252,0.15) 0%,transparent 70%);border-radius:50%;}
.bg-glow::after{content:'';position:absolute;bottom:0;right:0;width:400px;height:400px;background:radial-gradient(circle,rgba(26,92,255,0.12) 0%,transparent 70%);border-radius:50%;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 52px;background:rgba(5,14,46,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(78,180,255,0.1);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:white;text-decoration:none;display:flex;align-items:center;gap:10px;}
.nav-logo svg{width:20px;height:28px;flex-shrink:0;}
.nav-back{color:rgba(255,255,255,0.55);text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s;}
.nav-back:hover{color:var(--yellow);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 24px 60px;position:relative;z-index:1;}
.portal-card{width:100%;max-width:440px;background:rgba(255,255,255,0.06);border:1px solid rgba(192,132,252,0.2);border-radius:24px;padding:48px 40px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.4);}
.card-eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--lilac);margin-bottom:10px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1.15;margin-bottom:6px;}
.card-title em{font-style:italic;color:var(--yellow);}
.card-sub{font-size:13.5px;color:rgba(255,255,255,0.45);margin-bottom:36px;line-height:1.7;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11.5px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.5);margin-bottom:8px;text-transform:uppercase;}
.field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(192,132,252,0.2);border-radius:12px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.field input::placeholder{color:rgba(255,255,255,0.25);}
.field input:focus{border-color:var(--lilac);background:rgba(192,132,252,0.08);}
.btn-primary{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#c084fc);color:white;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;border:none;transition:all 0.2s;box-shadow:0 8px 24px rgba(192,132,252,0.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(192,132,252,0.4);}
.btn-primary:disabled{opacity:0.5;transform:none;}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none;line-height:1.7;}
.alert.error{background:rgba(255,107,91,0.15);border:1px solid rgba(255,107,91,0.3);color:#ff9b8f;}
.alert.show{display:block;}
.footer-note{text-align:center;font-size:13px;color:rgba(255,255,255,0.35);margin-top:20px;}
.footer-note a{color:var(--lilac);text-decoration:none;}
.g-star{position:fixed;pointer-events:none;animation:sparkle var(--sd,3s) ease-in-out infinite;animation-delay:var(--delay,0s);opacity:0;z-index:0;}
@keyframes sparkle{0%{opacity:0;transform:scale(0.4)}30%{opacity:1;transform:scale(1.2)}60%{opacity:0.75;transform:scale(0.9)}100%{opacity:0;transform:scale(0.3)}}
@media(max-width:560px){nav{padding:16px 20px;}.portal-card{padding:32px 20px;}}
</style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;z-index:99999;background:rgba(255,225,77,0.95);color:#050e2e;text-align:center;padding:10px 20px;font-size:13px;font-weight:600;font-family:DM Sans,sans-serif;">
  ✦ Demo version — Supabase backend not connected. For the live site visit: <a href="https://lighthouseinitiative.pages.dev" style="color:#1a5cff;text-decoration:underline;" target="_blank">lighthouseinitiative.pages.dev</a>
</div>
<div style="height:40px"></div>
<div class="cursor" id="cursor"><svg viewBox="0 0 40 40"><path d="M20 2 L22.5 17.5 L38 20 L22.5 22.5 L20 38 L17.5 22.5 L2 20 L17.5 17.5 Z" fill="#ffe14d"/><circle cx="20" cy="20" r="3.5" fill="white" opacity="0.9"/></svg></div>
<div class="bg-glow"></div>
<svg class="g-star" style="top:15%;right:5%;--sd:3s;--delay:0s;width:18px;height:18px" viewBox="0 0 24 24"><path d="M12 1 L13 11 L23 12 L13 13 L12 23 L11 13 L1 12 L11 11 Z" fill="#c084fc"/></svg>
<svg class="g-star" style="top:70%;left:4%;--sd:2.6s;--delay:-1s;width:14px;height:14px" viewBox="0 0 24 24"><path d="M12 1 L13 11 L23 12 L13 13 L12 23 L11 13 L1 12 L11 11 Z" fill="#ffe14d"/></svg>
<nav>
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="27" width="12" height="4" rx="1.5" fill="#c8b070"/><polygon points="7,27 15,27 13.5,10 8.5,10" fill="#e8dfc8"/><polygon points="7.2,22 14.8,22 14.4,18 7.6,18" fill="#d43030" opacity="0.9"/><circle cx="11" cy="8.5" r="2.2" fill="#ffe57d" opacity="0.95"/><circle cx="11" cy="8.5" r="1.2" fill="white"/></svg>
    Lighthouse
  </a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>
<main>
  <div class="portal-card">
    <div class="card-eyebrow">Ambassador Portal</div>
    <h1 class="card-title">Welcome <em>back</em></h1>
    <p class="card-sub">Sign in with your Ambassador ID and password.</p>
    <div class="alert error" id="loginError"></div>
    <div class="field"><label>Ambassador ID</label><input type="text" id="ambassadorId" placeholder="e.g. LH-AMBA-0001"></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Your password"></div>
    <button class="btn-primary" onclick="handleLogin()" id="loginBtn">Sign In →</button>
    <p class="footer-note">Not an ambassador yet? <a href="ambassador-apply.html">Apply here</a></p>
  </div>
</main>
<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

async function handleLogin() {
  const id = document.getElementById('ambassadorId').value.trim();
  const pw = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.classList.remove('show');
  if (!id || !pw) { errEl.textContent = 'Please enter your Ambassador ID and password.'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const { data: amb, error: lookupErr } = await sb.from('ambassadors').select('email').eq('ambassador_id', id).single();
    if (lookupErr || !amb) { errEl.textContent = 'Ambassador ID not found. Check your ID and try again.'; errEl.classList.add('show'); btn.disabled=false; btn.textContent='Sign In →'; return; }
    const { error: authErr } = await sb.auth.signInWithPassword({ email: amb.email, password: pw });
    if (authErr) { errEl.textContent = 'Incorrect password. Try again.'; errEl.classList.add('show'); btn.disabled=false; btn.textContent='Sign In →'; return; }
    window.location.href = 'ambassador-dashboard.html';
  } catch(e) { errEl.textContent = 'Something went wrong. Please try again.'; errEl.classList.add('show'); btn.disabled=false; btn.textContent='Sign In →'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
<script>(function(){var el=document.getElementById('cursor'),mx=-200,my=-200,angle=0;document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});document.addEventListener('mouseleave',function(){mx=-200;my=-200;});function tick(){angle=(angle+1.5)%360;el.style.transform='translate('+(mx-14)+'px,'+(my-14)+'px) rotate('+angle+'deg)';requestAnimationFrame(tick);}requestAnimationFrame(tick);})();</script>
</body>
</html>
